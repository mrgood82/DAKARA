class SpriteItem {
    constructor(assetId, trashType, xPos, yPos, width, height, canBeThrown = true) {
        this.id = assetId; this.type = trashType; this.x = xPos; this.y = yPos;
        this.w = width; this.h = height; this.initialX = xPos; this.initialY = yPos;
        this.isTrash = canBeThrown; this.isBeingDragged = false;
    }
    render(renderingContext) {
        const imageRef = assets.images[this.id];
        if (imageRef && imageRef.complete) { renderingContext.drawImage(imageRef, this.x, this.y, this.w, this.h); } 
        else { renderingContext.fillStyle = this.isTrash ? "#e67e22" : "#3498db"; renderingContext.fillRect(this.x, this.y, this.w, this.h); }
        if (this.isBeingDragged) {
            const displayName = ITEM_DISPLAY_NAMES[this.id] || "Item";
            renderingContext.save();
            renderingContext.textAlign = "center";
            renderingContext.font = "bold 26px 'Arial Black', Gadget, sans-serif";
            renderingContext.shadowBlur = 15; renderingContext.shadowColor = "rgba(0, 0, 0, 1)";
            renderingContext.fillStyle = "#FFD700"; renderingContext.strokeStyle = "#000000"; renderingContext.lineWidth = 4;
            renderingContext.strokeText(displayName.toUpperCase(), this.x + this.w / 2, this.y - 20);
            renderingContext.fillText(displayName.toUpperCase(), this.x + this.w / 2, this.y - 20);
            renderingContext.restore();
        }
    }
    returnToOrigin() { this.x = this.initialX; this.y = this.initialY; }
}

        gameObjects.push(new SpriteItem("tempat_tulis", "hiasan", 575, 520, 45, 65, false));

        // --- SAMPAH ---
        gameObjects.push(new SpriteItem("bangkai_kodok", "organik", 150, 580, 70, 35, true));
        gameObjects.push(new SpriteItem("buku_bekas", "organik", 1225, 390, 80, 45, true));
        gameObjects.push(new SpriteItem("sisa_popmie", "organik", 805, 595, 50, 60, true));
        gameObjects.push(new SpriteItem("boba", "anorganik", 435, 630, 45, 80, true));
        gameObjects.push(new SpriteItem("pengharum", "anorganik", 430, 470, 30, 70, true));
        gameObjects.push(new SpriteItem("foil", "anorganik", 310, 580, 40, 70, true));
        gameObjects.push(new SpriteItem("sisa_cat", "b3", 55, 580, 75, 85, true));
        gameObjects.push(new SpriteItem("sanitizer", "b3", 1200, 430, 35, 65, true));
        gameObjects.push(new SpriteItem("mouse_rusak", "b3", 960, 390, 45, 25, true));

        timerInterval = setInterval(() => { gameTimer--; if (gameTimer <= 0) { clearInterval(timerInterval); currentState = "SCREEN_LOSE"; handleBGM('lose'); } }, 1000);
    }
    currentState = "IN_GAME";
}

function drawButtonUI(btnId, posX, posY, width, height, assetNormal, assetHover) {
    const isHovered = (currentHoverButton === btnId); const targetImage = isHovered ? assets.images[assetHover] : assets.images[assetNormal];
    if (targetImage && targetImage.complete) { ctx.drawImage(targetImage, posX, posY, width, height); }
}

function wrapText(context, text, x, y, maxWidth, lineHeight) {
    let words = text.split(' '); let line = '';
    for(let n = 0; n < words.length; n++) {
        let testLine = line + words[n] + ' '; let metrics = context.measureText(testLine);
        if (metrics.width > maxWidth && n > 0) { context.fillText(line, x, y); line = words[n] + ' '; y += lineHeight; } else { line = testLine; }
    }
    context.fillText(line, x, y);
}

function drawTrashStats() {
    const counts = { organik: 0, anorganik: 0, b3: 0 }; gameObjects.forEach(obj => { if (obj.isTrash && counts.hasOwnProperty(obj.type)) counts[obj.type]++; });
    const startX = 30; const startY = 25; const padding = 12; const boxW = 75; const boxH = 60;
    ctx.save(); ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; ctx.beginPath(); ctx.roundRect(startX - 10, startY - 10, (boxW * 3) + (padding * 2) + 20, boxH + 20, 15); ctx.fill(); ctx.restore();
    const drawStatBox = (x, count, color) => {
        ctx.save(); ctx.fillStyle = color; ctx.shadowBlur = 8; ctx.shadowColor = color; ctx.beginPath(); ctx.roundRect(x, startY, boxW, boxH, 10); ctx.fill();
        ctx.fillStyle = "white"; ctx.textAlign = "center"; ctx.font = "bold 28px Arial"; ctx.fillText(count, x + (boxW / 2), startY + 40); ctx.restore();
    };
    drawStatBox(startX, counts.organik, "#27ae60"); drawStatBox(startX + boxW + padding, counts.anorganik, "#2980b9"); drawStatBox(startX + (boxW + padding) * 2, counts.b3, "#e67e22");
}

function mainLoop() {
    ctx.clearRect(0, 0, 1280, 720); ctx.save();
    let shakeX = 0, shakeY = 0;
    if (currentState === "IN_GAME" && activeLevel >= 3 && gameTimer <= 15 && gameTimer > 0) {
        let cycle = Math.sin(Date.now() / 318); if (cycle > 0) { shakeX = (Math.random() * 6 - 3); shakeY = (Math.random() * 6 - 3); }
    }
    if (screenShakeCounter > 0) { shakeX += Math.random() * 10 - 5; shakeY += Math.random() * 10 - 5; screenShakeCounter--; }
    ctx.translate(shakeX, shakeY);

    if (currentState === "MAIN_MENU") {
        ctx.drawImage(video, 0, 0, 1280, 720); if (assets.images["logo"]) ctx.drawImage(assets.images["logo"], menuConfig.logo.x, menuConfig.logo.y, menuConfig.logo.w, menuConfig.logo.h);
        drawButtonUI("play", menuConfig.buttons.x, 310, menuConfig.buttons.w, menuConfig.buttons.h, "btn_play", "btn_play_h");
        drawButtonUI("levels", menuConfig.buttons.x, 430, menuConfig.buttons.w, menuConfig.buttons.h, "btn_levels", "btn_levels_h");
        drawButtonUI("guide", menuConfig.buttons.x, 550, menuConfig.buttons.w, menuConfig.buttons.h, "btn_guide", "btn_guide_h");
    } 
    else if (currentState === "IN_GAME" || currentState === "SCREEN_WIN" || currentState === "SCREEN_LOSE") {
        let currentBG = assets.images[`bg_level${activeLevel}`]; if (currentBG) ctx.drawImage(currentBG, 0, 0, 1280, 720);
        if (currentState === "IN_GAME") {
            drawTrashStats(); ctx.save(); ctx.textAlign = "left"; ctx.font = "bold 30px Arial"; ctx.fillStyle = "#FFD700"; 
            ctx.fillText((`LEVEL ${activeLevel} : ${LEVEL_NAMES[activeLevel] || ""}`).toUpperCase(), 30, 135); ctx.restore();
        }
        if (activeLevel >= 3 && currentState === "IN_GAME" && gameTimer <= 15) { let flashOpacity = Math.sin(Date.now() / 200) * 0.15 + 0.15; ctx.fillStyle = `rgba(255, 0, 0, ${flashOpacity})`; ctx.fillRect(0, 0, 1280, 720); }
        gameObjects.forEach(obj => { if (!obj.isTrash && obj !== dragSubject) obj.render(ctx); });
        BIN_DEFINITIONS.forEach(bin => { const imgBin = assets.images[`bin_${bin.type}`]; if (imgBin) ctx.drawImage(imgBin, bin.x, bin.y, bin.w, bin.h); });
        gameObjects.forEach(obj => { if (obj.isTrash && obj !== dragSubject) obj.render(ctx); });
        if (dragSubject) dragSubject.render(ctx);
        for (let i = 0; i < playerLives; i++) { if (assets.images["heart"]) ctx.drawImage(assets.images["heart"], 1120 + (i * 45), 30, 40, 40); }
        if (activeLevel >= 3 && currentState === "IN_GAME") { ctx.save(); ctx.textAlign = "center"; ctx.fillStyle = gameTimer <= 15 ? "#ff3333" : "white"; ctx.font = "bold 40px Arial"; ctx.fillText("WAKTU: " + gameTimer + "s", 640, 60); ctx.restore(); }
        
        if (currentState === "SCREEN_WIN" || currentState === "SCREEN_LOSE") {
            ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, 1280, 720);
            const resultHeader = (currentState === "SCREEN_WIN") ? assets.images["win_img"] : assets.images["lose_img"]; 
            
            if (currentState === "SCREEN_WIN" && activeLevel === 6) {
                if (resultHeader) ctx.drawImage(resultHeader, 415, 255, 450, 210);
            } else {
                if (resultHeader) ctx.drawImage(resultHeader, 415, 60, 450, 210);
            }
            
            if (currentState === "SCREEN_LOSE") { 
                ctx.save(); ctx.textAlign = "center"; ctx.fillStyle = "#ffcc00"; ctx.font = "bold 24px Arial"; 
                ctx.fillText("Kesempatan Mengulang Level Ini: " + levelRetries, 640, 290); ctx.restore(); 
                drawButtonUI("restart", 465, 320, 350, 100, "btn_restart", "btn_restart_h"); 
                drawButtonUI("home", 465, 435, 350, 100, "btn_home", "btn_home_h");
            } 
            else if (currentState === "SCREEN_WIN") {
                if (activeLevel < 6) {
                    drawButtonUI("continue", 465, 290, 350, 100, "btn_continue", "btn_continue_h");
                    drawButtonUI("restart", 465, 405, 350, 100, "btn_restart", "btn_restart_h");
                    drawButtonUI("home", 465, 520, 350, 100, "btn_home", "btn_home_h");
                }
            }
        }
    }
    else if (currentState === "PHASE_TRANSITION") { ctx.drawImage(transVideo, 0, 0, 1280, 720); }
    else if (currentState === "GAME_OVER_THANKS") {
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, 1280, 720);
        let grd = ctx.createRadialGradient(640, 360, 100, 640, 360, 600);
        grd.addColorStop(0, "rgba(40, 40, 40, 1)"); grd.addColorStop(1, "rgba(0, 0, 0, 1)");
        ctx.fillStyle = grd; ctx.fillRect(0, 0, 1280, 720);
        if (assets.images["logo"]) ctx.drawImage(assets.images["logo"], 440, 50, 400, 180);
        ctx.textAlign = "center"; ctx.save(); ctx.shadowBlur = 15; ctx.shadowColor = "#FFD700";
        ctx.font = "bold 60px 'Verdana', sans-serif"; ctx.fillStyle = "#FFFFFF";
        ctx.fillText("TERIMAKASIH TELAH", 640, 350); ctx.fillText("MEMAINKAN GAME KAMI", 640, 430); ctx.restore();
        ctx.save(); ctx.font = "italic bold 50px 'Arial Black', sans-serif"; ctx.fillStyle = "#FFD700";
        ctx.fillText("DAKARA TEAM", 640, 550); ctx.restore();
        drawButtonUI("home_end", 465, 620, 350, 80, "btn_home", "btn_home_h");
    }
    
    const muteImg = isMuted ? assets.images["btn_unmute"] : assets.images["btn_mute"]; 
    if (muteImg && muteImg.complete) { ctx.drawImage(muteImg, muteBtnConfig.x, muteBtnConfig.y, muteBtnConfig.w, muteBtnConfig.h); }

    if (factOverlay.active) {
        factOverlay.timer++; if (factOverlay.timer < 30) factOverlay.opacity += 0.035; else if (factOverlay.timer > factOverlay.duration - 30) factOverlay.opacity -= 0.035;
        ctx.save(); ctx.globalAlpha = Math.max(0, Math.min(1, factOverlay.opacity));
        if (factOverlay.bgSnapshot) { ctx.filter = "blur(12px) brightness(0.4)"; ctx.drawImage(factOverlay.bgSnapshot, 0, 0, 1280, 720); ctx.filter = "none"; }
        if (assets.images["logo"]) ctx.drawImage(assets.images["logo"], 490, 60, 300, 140);
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.beginPath(); ctx.roundRect(240, 280, 800, 280, 30); ctx.fill();
        ctx.textAlign = "center"; ctx.fillStyle = "#FFD700"; ctx.font = "bold 38px Arial"; ctx.fillText("TAHUKAH KAMU?", 640, 350);
        ctx.fillStyle = "white"; ctx.font = "italic 30px Verdana"; wrapText(ctx, factOverlay.text, 640, 410, 720, 40);
        ctx.fillStyle = "rgba(255,255,255,0.2)"; ctx.fillRect(440, 520, 400, 12);
        ctx.fillStyle = "#FFD700"; let progress = (factOverlay.timer / factOverlay.duration) * 400; ctx.fillRect(440, 520, progress, 12);
        ctx.restore(); if (factOverlay.timer >= factOverlay.duration) { factOverlay.active = false; actualStartLevel(factOverlay.nextLevel); }
    }

    if (phaseOverlay.active) {
        phaseOverlay.timer++; if (phaseOverlay.timer < 30) { phaseOverlay.opacity += 0.035; phaseOverlay.scale += 0.003; } else if (phaseOverlay.timer > phaseOverlay.duration - 30) { phaseOverlay.opacity -= 0.035; }
        ctx.save(); ctx.globalAlpha = Math.max(0, Math.min(1, phaseOverlay.opacity));
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, 1280, 720);
        ctx.textAlign = "center"; ctx.translate(640, 345); ctx.scale(phaseOverlay.scale, phaseOverlay.scale);
        ctx.font = "bold 85px 'Verdana', sans-serif"; ctx.fillStyle = "#FFD700"; ctx.fillText(phaseOverlay.text, 0, 0);
        ctx.font = "bold 48px 'Arial'"; ctx.fillStyle = "#FFFFFF"; ctx.fillText(phaseOverlay.subtext, 0, 80); ctx.restore();
        if (phaseOverlay.timer >= phaseOverlay.duration) { phaseOverlay.active = false; if (phaseOverlay.pendingMusic) { handleBGM(phaseOverlay.pendingMusic); phaseOverlay.pendingMusic = null; } }
    }

    if (blackFade.active) {
        if (blackFade.opacity < blackFade.target) blackFade.opacity += 0.025;
        else if (blackFade.opacity > blackFade.target) blackFade.opacity -= 0.025;
        ctx.fillStyle = `rgba(0, 0, 0, ${blackFade.opacity})`;
        ctx.fillRect(0, 0, 1280, 720);
        if (Math.abs(blackFade.opacity - blackFade.target) < 0.03) {
            blackFade.opacity = blackFade.target;
            if (blackFade.target === 1 && blackFade.callback) { const cb = blackFade.callback; blackFade.callback = null; cb(); } else if (blackFade.target === 0) { blackFade.active = false; }
        }
    }
    ctx.restore(); requestAnimationFrame(mainLoop);
}

function calculateInputPos(e) {
    const rect = canvas.getBoundingClientRect(); let clientX, clientY;
    if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
    else if (e.changedTouches && e.changedTouches.length > 0) { clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY; }
    else { clientX = e.clientX; clientY = e.clientY; }
    const scaleX = 1280 / rect.width; const scaleY = 720 / rect.height; return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function handleInputDown(e) {
    if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(() => {}); }
    const pos = calculateInputPos(e);
    if (checkCollision(pos, muteBtnConfig.x, muteBtnConfig.y, muteBtnConfig.w, muteBtnConfig.h)) { toggleMute(); executeSFX('click'); return; }
    if (currentState === "MAIN_MENU" || currentState === "LOADING") { video.play().catch(() => {}); if (assets.sounds['lobby'] && assets.sounds['lobby'].paused) handleBGM('lobby'); }
    if (currentState === "MAIN_MENU") {
        if (checkCollision(pos, menuConfig.buttons.x, 310, menuConfig.buttons.w, menuConfig.buttons.h)) currentHoverButton = "play";
        if (checkCollision(pos, menuConfig.buttons.x, 430, menuConfig.buttons.w, menuConfig.buttons.h)) currentHoverButton = "levels";
        if (checkCollision(pos, menuConfig.buttons.x, 550, menuConfig.buttons.w, menuConfig.buttons.h)) currentHoverButton = "guide";
    } else if (currentState === "IN_GAME") {
        for (let i = gameObjects.length - 1; i >= 0; i--) { const target = gameObjects[i]; if (checkCollision(pos, target.x, target.y, target.w, target.h)) { dragSubject = target; dragSubject.isBeingDragged = true; break; } }
    } else if (currentState === "SCREEN_WIN" || currentState === "SCREEN_LOSE") {
        if (currentState === "SCREEN_LOSE") {
            if (checkCollision(pos, 465, 320, 350, 100)) currentHoverButton = "restart";
            if (checkCollision(pos, 465, 435, 350, 100)) currentHoverButton = "home";
        } else if (currentState === "SCREEN_WIN" && activeLevel < 6) {
            if (checkCollision(pos, 465, 290, 350, 100)) currentHoverButton = "continue";
            if (checkCollision(pos, 465, 405, 350, 100)) currentHoverButton = "restart";
            if (checkCollision(pos, 465, 520, 350, 100)) currentHoverButton = "home";
        }
    } else if (currentState === "GAME_OVER_THANKS") {
        if (checkCollision(pos, 465, 620, 350, 80)) currentHoverButton = "home_end";
    }
}

function handleInputMove(e) { if (!dragSubject) return; const pos = calculateInputPos(e); dragSubject.x = pos.x - dragSubject.w / 2; dragSubject.y = pos.y - dragSubject.h / 2; }

function handleInputUp(e) {
    const pos = calculateInputPos(e);
    if (currentHoverButton) {
        executeSFX('click');
        if (currentHoverButton === "play") setupLevel(1);
        if (currentHoverButton === "continue") { 
            if(activeLevel === 3) startTransitionToPhase2(); 
            else if(activeLevel === 1) setupLevel(2); 
            else if(activeLevel === 2) setupLevel(3); 
            else if(activeLevel === 4) setupLevel(5); 
            else if(activeLevel === 5) setupLevel(6);
        }
        if (currentHoverButton === "restart") setupLevel(activeLevel); 
        if (currentHoverButton === "home" || currentHoverButton === "home_end") { 
            clearInterval(timerInterval); activeLevel = 0; levelRetries = 3; currentState = "MAIN_MENU"; handleBGM('lobby'); video.play(); 
        }
    }
    if (dragSubject) {
        let targetBin = BIN_DEFINITIONS.find(bin => checkCollision(pos, bin.x, bin.y, bin.w, bin.h));
        if (targetBin) {
            if (dragSubject.isTrash && dragSubject.type === targetBin.type) {
                executeSFX('trash'); gameObjects = gameObjects.filter(item => item !== dragSubject);
                if (gameObjects.filter(item => item.isTrash).length === 0) {
                    clearInterval(timerInterval); handleBGM('win'); currentState = "SCREEN_WIN"; 
                    if (activeLevel === 6) {
                        setTimeout(() => {
                            blackFade.active = true; blackFade.target = 1;
                            blackFade.callback = () => { currentState = "GAME_OVER_THANKS"; handleBGM('lobby'); blackFade.target = 0; };
                        }, 2500); 
                    }
                }
            } else { 
                playerLives--; screenShakeCounter = 15; executeSFX('click'); 
                if (playerLives <= 0) { clearInterval(timerInterval); currentState = "SCREEN_LOSE"; handleBGM('lose'); } 
                dragSubject.returnToOrigin(); 
            }
        } else { dragSubject.returnToOrigin(); }
        dragSubject.isBeingDragged = false; dragSubject = null;
    }
    currentHoverButton = null;
}

canvas.addEventListener('mousedown', handleInputDown); window.addEventListener('mousemove', handleInputMove); window.addEventListener('mouseup', handleInputUp);
canvas.addEventListener('touchstart', (e) => { if (e.cancelable) e.preventDefault(); handleInputDown(e); }, {passive: false});
canvas.addEventListener('touchmove', (e) => { if (e.cancelable) e.preventDefault(); handleInputMove(e); }, {passive: false});
canvas.addEventListener('touchend', (e) => { if (e.cancelable) e.preventDefault(); handleInputUp(e); }, {passive: false});

function checkCollision(pos, x, y, w, h) { return pos.x >= x && pos.x <= x + w && pos.y >= y && pos.y <= y + h; }

function initializeGame() {
    currentState = "LOADING"; const imageKeys = Object.keys(IMAGE_RESOURCES); const audioKeys = Object.keys(AUDIO_RESOURCES);
    assets.totalResources = imageKeys.length + audioKeys.length;
    imageKeys.forEach(key => { const img = new Image(); img.src = IMAGE_RESOURCES[key]; img.onload = () => { assets.images[key] = img; resourceLoaded(); }; img.onerror = () => { resourceLoaded(); }; });
    audioKeys.forEach(key => { const sound = new Audio(); sound.src = AUDIO_RESOURCES[key]; sound.load(); sound.oncanplaythrough = () => { if (!assets.sounds[key]) { assets.sounds[key] = sound; resourceLoaded(); } }; sound.onerror = () => { resourceLoaded(); }; });
}

function resourceLoaded() { assets.loadedCount++; if (assets.loadedCount >= assets.totalResources) { setTimeout(() => { currentState = "MAIN_MENU"; handleBGM('lobby'); video.play().catch(() => {}); }, 500); } }

initializeGame();
mainLoop();
</script>
